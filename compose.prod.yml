# compose.prod.yml - Docker Compose overrides for production environment
name: 6ss-prod

services:

  backend:
    build:
      target: prod
    restart: unless-stopped
    env_file:
      - backend/.env.prod
    # Require database migrations to complete before the backend starts.
    depends_on:
      database-migrations:
        condition: service_completed_successfully
    # Hard resource caps so a traffic/abuse spike gets OOM-killed and restarted
    # instead of taking down the host. Tune to the target machine.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  cache:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  database:
    restart: unless-stopped
    env_file:
      - backend/.env.prod
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  database-migrations:
    build:
      target: db-migrations
    restart: "no"
    env_file:
      - backend/.env.prod

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # Bind to loopback only: the Cloudflare tunnel reaches the frontend over the
    # internal Docker network (service name `frontend`), so the host port does not
    # need to be on 0.0.0.0. Docker publishes ports by editing iptables directly,
    # bypassing the host firewall, so a 0.0.0.0 bind would expose the app on the
    # LAN/WAN and let clients reach the backend /api proxy without going through
    # Cloudflare. Loopback keeps the tunnel as the only external ingress.
    ports:
      - "127.0.0.1:80:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m

  cloudflared:
    # Pinned by digest for reproducible, supply-chain-safe deploys instead of the
    # mutable `latest` tag. Resolved from cloudflare/cloudflared:latest on 2026-06-27.
    # To bump: `docker buildx imagetools inspect cloudflare/cloudflared:latest`.
    image: cloudflare/cloudflared@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    command: [ "tunnel", "--no-autoupdate", "run" ]
    profiles:
      - tunnel
