# compose.prod.yml - Docker Compose overrides for production environment
name: 6ss-prod

services:

  backend:
    build:
      target: prod
    restart: unless-stopped
    env_file:
      - backend/.env.prod
    # Require database migrations to complete before the backend starts.
    depends_on:
      database-migrations:
        condition: service_completed_successfully
    # Hard resource caps so a traffic/abuse spike gets OOM-killed and restarted
    # instead of taking down the host. Tune to the target machine.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  cache:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  database:
    restart: unless-stopped
    env_file:
      - backend/.env.prod
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  database-migrations:
    build:
      target: db-migrations
    restart: "no"
    env_file:
      - backend/.env.prod

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    command: [ "tunnel", "--no-autoupdate", "run" ]
    profiles:
      - tunnel
    pull_policy: always
