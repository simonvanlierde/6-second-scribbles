# compose.yml - Base Docker Compose configuration for all environments
services:

  backend:
    build:
      context: ./backend
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      backend-migrations:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: database
      REDIS_HOST: cache
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend-migrations:
    build:
      context: ./backend
    depends_on:
      database:
        condition: service_healthy
    environment:
      POSTGRES_HOST: database

  cache:
    image: redis:8-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s

  database:
    image: postgres:18-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
