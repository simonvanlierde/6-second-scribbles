asyncapi: 3.1.0
info:
  title: "6 Second Scribbles Room WebSocket"
  version: 0.1.0
  description: |
    Published realtime websocket contract for the multiplayer game.
    
    The current implementation source of truth remains the Pydantic models in `backend/app/rooms/protocol.py`, with generated JSON Schema artifacts published under `contracts/jsonschema/`.
    
    Representative payload examples live in `contracts/`.
  tags:
    - name: realtime
    - name: websocket
    - name: multiplayer
servers:
  local:
    host: localhost:8000
    protocol: ws
    pathname: /party/{roomId}
    description: "Local FastAPI websocket endpoint for one room."
channels:
  roomConnection:
    address: /party/{roomId}
    title: "Room WebSocket"
    summary: "Bidirectional websocket carrying all room gameplay events."
    parameters:
      roomId:
        description: "Short room code used to connect to a game room."
    messages:
      clientEvent:
        $ref: "#/components/messages/clientEvent"
      serverEvent:
        $ref: "#/components/messages/serverEvent"
operations:
  sendClientEvent:
    action: send
    title: "Client sends room command or event"
    summary: "Browser sends a validated room event such as `join`, `player_ready`, drawing updates, or room settings changes."
    channel:
      $ref: "#/channels/roomConnection"
    messages:
      - $ref: "#/components/messages/client_heartbeat"
      - $ref: "#/components/messages/client_join"
      - $ref: "#/components/messages/client_request_game_state"
      - $ref: "#/components/messages/client_game_complete"
      - $ref: "#/components/messages/client_player_ready"
      - $ref: "#/components/messages/client_restart_game"
      - $ref: "#/components/messages/client_round_complete"
      - $ref: "#/components/messages/client_settings_update"
      - $ref: "#/components/messages/client_start_game"
      - $ref: "#/components/messages/client_start_guessing"
      - $ref: "#/components/messages/client_start_round"
      - $ref: "#/components/messages/client_submit_guess"
      - $ref: "#/components/messages/client_language_update"
      - $ref: "#/components/messages/client_privacy_changed"
      - $ref: "#/components/messages/client_draw_stroke"
      - $ref: "#/components/messages/client_draw_stroke_partial"
      - $ref: "#/components/messages/client_drawpad_clear"
      - $ref: "#/components/messages/client_pad_visibility"
      - $ref: "#/components/messages/client_cast_kick_vote"
      - $ref: "#/components/messages/client_initiate_kick"
  receiveServerEvent:
    action: receive
    title: "Client receives room state or broadcast"
    summary: "Server sends room snapshots, game state transitions, drawing relays, moderation events, and custom-category broadcasts."
    channel:
      $ref: "#/channels/roomConnection"
    messages:
      - $ref: "#/components/messages/server_host_restored"
      - $ref: "#/components/messages/server_join_error"
      - $ref: "#/components/messages/server_player_joined"
      - $ref: "#/components/messages/server_player_left"
      - $ref: "#/components/messages/server_room_state"
      - $ref: "#/components/messages/server_game_complete"
      - $ref: "#/components/messages/server_ready_status"
      - $ref: "#/components/messages/server_restart_game"
      - $ref: "#/components/messages/server_round_complete"
      - $ref: "#/components/messages/server_settings_update"
      - $ref: "#/components/messages/server_start_game"
      - $ref: "#/components/messages/server_start_guessing"
      - $ref: "#/components/messages/server_start_round"
      - $ref: "#/components/messages/server_language_update"
      - $ref: "#/components/messages/server_draw_stroke"
      - $ref: "#/components/messages/server_draw_stroke_partial"
      - $ref: "#/components/messages/server_drawpad_clear"
      - $ref: "#/components/messages/server_pad_visibility"
      - $ref: "#/components/messages/server_kick_error"
      - $ref: "#/components/messages/server_kick_vote_expired"
      - $ref: "#/components/messages/server_kick_vote_started"
      - $ref: "#/components/messages/server_kick_vote_updated"
      - $ref: "#/components/messages/server_player_kicked"
      - $ref: "#/components/messages/server_permission_error"
      - $ref: "#/components/messages/server_player_ready_error"
      - $ref: "#/components/messages/server_protocol_error"
      - $ref: "#/components/messages/server_submit_guess_error"
      - $ref: "#/components/messages/server_custom_category_added"
      - $ref: "#/components/messages/server_custom_category_removed"
      - $ref: "#/components/messages/server_host_changed"
components:
  messages:
    client_heartbeat:
      name: heartbeat
      title: heartbeat
      summary: "Keep the websocket session alive."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/heartbeat.schema.json
      examples:
        - name: heartbeat
          summary: "Client heartbeat."
          payload:
            type: heartbeat
    client_join:
      name: join
      title: join
      summary: "Join a room with the local player identity."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/join.schema.json
      examples:
        - name: join
          summary: "Client joins a room."
          payload:
            type: join
            playerId: player-1
            name: Alex
    client_request_game_state:
      name: request_game_state
      title: request_game_state
      summary: "Request the latest room snapshot."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/request_game_state.schema.json
      examples:
        - name: request_game_state
          summary: "Client requests the latest room state."
          payload:
            type: request_game_state
            playerId: player-1
    client_game_complete:
      name: game_complete
      title: game_complete
      summary: "Signal that the game is complete."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/game_complete.schema.json
      examples:
        []
    client_player_ready:
      name: player_ready
      title: player_ready
      summary: "Mark the current player as ready."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/player_ready.schema.json
      examples:
        []
    client_restart_game:
      name: restart_game
      title: restart_game
      summary: "Restart the game from the lobby state."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/restart_game.schema.json
      examples:
        []
    client_round_complete:
      name: round_complete
      title: round_complete
      summary: "Signal that the current round is complete."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/round_complete.schema.json
      examples:
        []
    client_settings_update:
      name: settings_update
      title: settings_update
      summary: "Update shared game settings."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/settings_update.schema.json
      examples:
        []
    client_start_game:
      name: start_game
      title: start_game
      summary: "Host starts a game with room settings."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/start_game.schema.json
      examples:
        []
    client_start_guessing:
      name: start_guessing
      title: start_guessing
      summary: "Host transitions the room into guessing."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/start_guessing.schema.json
      examples:
        []
    client_start_round:
      name: start_round
      title: start_round
      summary: "Host starts a drawing round with assigned cards."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/start_round.schema.json
      examples:
        []
    client_submit_guess:
      name: submit_guess
      title: submit_guess
      summary: "Submit guesses for another player's drawing."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/submit_guess.schema.json
      examples:
        []
    client_language_update:
      name: language_update
      title: language_update
      summary: "Change the room language."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/language_update.schema.json
      examples:
        []
    client_privacy_changed:
      name: privacy_changed
      title: privacy_changed
      summary: "Change the room privacy setting."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/privacy_changed.schema.json
      examples:
        []
    client_draw_stroke:
      name: draw_stroke
      title: draw_stroke
      summary: "Broadcast a completed draw stroke."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/draw_stroke.schema.json
      examples:
        []
    client_draw_stroke_partial:
      name: draw_stroke_partial
      title: draw_stroke_partial
      summary: "Broadcast an in-progress draw stroke."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/draw_stroke_partial.schema.json
      examples:
        []
    client_drawpad_clear:
      name: drawpad_clear
      title: drawpad_clear
      summary: "Clear the shared drawpad."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/drawpad_clear.schema.json
      examples:
        []
    client_pad_visibility:
      name: pad_visibility
      title: pad_visibility
      summary: "Show or hide the shared drawpad."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/pad_visibility.schema.json
      examples:
        []
    client_cast_kick_vote:
      name: cast_kick_vote
      title: cast_kick_vote
      summary: "Cast a vote in an active kick vote."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/cast_kick_vote.schema.json
      examples:
        []
    client_initiate_kick:
      name: initiate_kick
      title: initiate_kick
      summary: "Start a kick vote for a target player."
      contentType: application/json
      payload:
        $ref: jsonschema/client-events/initiate_kick.schema.json
      examples:
        []
    server_host_restored:
      name: host_restored
      title: host_restored
      summary: "A reconnecting host regained host status."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/host_restored.schema.json
      examples:
        - name: host_restored
          summary: "Server confirms a reconnecting host regained host status."
          payload:
            type: host_restored
            message: "Host restored"
    server_join_error:
      name: join_error
      title: join_error
      summary: "Join failed but the connection remained valid."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/join_error.schema.json
      examples:
        - name: join_error
          summary: "Server reports that joining failed."
          payload:
            type: join_error
            error: room_not_found
            message: "Room does not exist."
    server_player_joined:
      name: player_joined
      title: player_joined
      summary: "A player joined the room."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/player_joined.schema.json
      examples:
        - name: player_joined
          summary: "Server broadcasts that a player joined."
          payload:
            type: player_joined
            playerId: player-2
            name: Sam
            players:
              - id: player-1
                name: Alex
              - id: player-2
                name: Sam
            isHost: false
    server_player_left:
      name: player_left
      title: player_left
      summary: "A player left the room."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/player_left.schema.json
      examples:
        - name: player_left
          summary: "Server broadcasts that a player left."
          payload:
            type: player_left
            playerId: player-2
    server_room_state:
      name: room_state
      title: room_state
      summary: "Current room snapshot."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/room_state.schema.json
      examples:
        - name: room_state
          summary: "Server sends the latest room snapshot."
          payload:
            type: room_state
            players:
              - id: player-1
                name: Alex
            hostId: player-1
            gamePhase: lobby
            difficulty: easy
            maxRounds: 3
            roundStartTime: null
            drawingTimeLimit: 60
            padVisibility: true
            isPrivate: false
            language: en
    server_game_complete:
      name: game_complete
      title: game_complete
      summary: "Game completion results broadcast."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/game_complete.schema.json
      examples:
        []
    server_ready_status:
      name: ready_status
      title: ready_status
      summary: "Current ready-player counts."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/ready_status.schema.json
      examples:
        []
    server_restart_game:
      name: restart_game
      title: restart_game
      summary: "Game restart broadcast."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/restart_game.schema.json
      examples:
        []
    server_round_complete:
      name: round_complete
      title: round_complete
      summary: "Round completion results broadcast."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/round_complete.schema.json
      examples:
        []
    server_settings_update:
      name: settings_update
      title: settings_update
      summary: "Game settings updated."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/settings_update.schema.json
      examples:
        []
    server_start_game:
      name: start_game
      title: start_game
      summary: "Game start broadcast."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/start_game.schema.json
      examples:
        []
    server_start_guessing:
      name: start_guessing
      title: start_guessing
      summary: "Guessing phase started."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/start_guessing.schema.json
      examples:
        []
    server_start_round:
      name: start_round
      title: start_round
      summary: "Round start broadcast with assigned cards."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/start_round.schema.json
      examples:
        []
    server_language_update:
      name: language_update
      title: language_update
      summary: "Room language updated."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/language_update.schema.json
      examples:
        []
    server_draw_stroke:
      name: draw_stroke
      title: draw_stroke
      summary: "A completed draw stroke relay."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/draw_stroke.schema.json
      examples:
        []
    server_draw_stroke_partial:
      name: draw_stroke_partial
      title: draw_stroke_partial
      summary: "An in-progress draw stroke relay."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/draw_stroke_partial.schema.json
      examples:
        []
    server_drawpad_clear:
      name: drawpad_clear
      title: drawpad_clear
      summary: "Drawpad cleared."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/drawpad_clear.schema.json
      examples:
        []
    server_pad_visibility:
      name: pad_visibility
      title: pad_visibility
      summary: "Shared drawpad visibility changed."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/pad_visibility.schema.json
      examples:
        []
    server_kick_error:
      name: kick_error
      title: kick_error
      summary: "Kick workflow error."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/kick_error.schema.json
      examples:
        []
    server_kick_vote_expired:
      name: kick_vote_expired
      title: kick_vote_expired
      summary: "Kick vote expired."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/kick_vote_expired.schema.json
      examples:
        []
    server_kick_vote_started:
      name: kick_vote_started
      title: kick_vote_started
      summary: "Kick vote started."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/kick_vote_started.schema.json
      examples:
        []
    server_kick_vote_updated:
      name: kick_vote_updated
      title: kick_vote_updated
      summary: "Kick vote tally updated."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/kick_vote_updated.schema.json
      examples:
        []
    server_player_kicked:
      name: player_kicked
      title: player_kicked
      summary: "A player was kicked from the room."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/player_kicked.schema.json
      examples:
        []
    server_permission_error:
      name: permission_error
      title: permission_error
      summary: "Unauthorized action attempt."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/permission_error.schema.json
      examples:
        []
    server_player_ready_error:
      name: player_ready_error
      title: player_ready_error
      summary: "Player-ready validation failed."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/player_ready_error.schema.json
      examples:
        []
    server_protocol_error:
      name: protocol_error
      title: protocol_error
      summary: "Malformed or invalid websocket payload."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/protocol_error.schema.json
      examples:
        []
    server_submit_guess_error:
      name: submit_guess_error
      title: submit_guess_error
      summary: "Guess submission validation failed."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/submit_guess_error.schema.json
      examples:
        []
    server_custom_category_added:
      name: custom_category_added
      title: custom_category_added
      summary: "A custom category was added to the room."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/custom_category_added.schema.json
      examples:
        []
    server_custom_category_removed:
      name: custom_category_removed
      title: custom_category_removed
      summary: "A custom category was removed from the room."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/custom_category_removed.schema.json
      examples:
        []
    server_host_changed:
      name: host_changed
      title: host_changed
      summary: "Host ownership changed."
      contentType: application/json
      payload:
        $ref: jsonschema/server-events/host_changed.schema.json
      examples:
        []
    clientEvent:
      name: clientEvent
      title: "Client Event"
      summary: "Any validated client-to-server room event. Event types: heartbeat, join, request_game_state, game_complete, player_ready, restart_game, round_complete, settings_update, start_game, start_guessing, start_round, submit_guess, language_update, privacy_changed, draw_stroke, draw_stroke_partial, drawpad_clear, pad_visibility, cast_kick_vote, initiate_kick."
      contentType: application/json
      payload:
        $ref: jsonschema/client-event.schema.json
      examples:
        - name: join
          summary: "Client joins a room."
          payload:
            type: join
            playerId: player-1
            name: Alex
        - name: heartbeat
          summary: "Client heartbeat."
          payload:
            type: heartbeat
        - name: request_game_state
          summary: "Client requests the latest room state."
          payload:
            type: request_game_state
            playerId: player-1
    serverEvent:
      name: serverEvent
      title: "Server Event"
      summary: "Any validated server-to-client room event. Event types: host_restored, join_error, player_joined, player_left, room_state, game_complete, ready_status, restart_game, round_complete, settings_update, start_game, start_guessing, start_round, language_update, draw_stroke, draw_stroke_partial, drawpad_clear, pad_visibility, kick_error, kick_vote_expired, kick_vote_started, kick_vote_updated, player_kicked, permission_error, player_ready_error, protocol_error, submit_guess_error, custom_category_added, custom_category_removed, host_changed."
      contentType: application/json
      payload:
        $ref: jsonschema/server-event.schema.json
      examples:
        - name: room_state
          summary: "Server sends the latest room snapshot."
          payload:
            type: room_state
            players:
              - id: player-1
                name: Alex
            hostId: player-1
            gamePhase: lobby
            difficulty: easy
            maxRounds: 3
            roundStartTime: null
            drawingTimeLimit: 60
            padVisibility: true
            isPrivate: false
            language: en
        - name: player_joined
          summary: "Server broadcasts that a player joined."
          payload:
            type: player_joined
            playerId: player-2
            name: Sam
            players:
              - id: player-1
                name: Alex
              - id: player-2
                name: Sam
            isHost: false
        - name: host_restored
          summary: "Server confirms a reconnecting host regained host status."
          payload:
            type: host_restored
            message: "Host restored"
        - name: join_error
          summary: "Server reports that joining failed."
          payload:
            type: join_error
            error: room_not_found
            message: "Room does not exist."
        - name: player_left
          summary: "Server broadcasts that a player left."
          payload:
            type: player_left
            playerId: player-2
