[project]
  dependencies = [
    "alembic>=1.17.2",
    "asyncpg>=0.31.0",
    "fastapi[standard]>=0.122.0",
    "pydantic-settings>=2.12.0",
    "rapidfuzz>=3.14.3",
    "redis>=5.0",
  ]
  description = "Backend for 6-second-scribbles"
  name = "backend"
  readme = "README.md"
  requires-python = ">=3.14"
  version = "0.1.0"

[dependency-groups]
  dev = [
    "commitizen>=4.10.0",
    "greenlet>=3.3.2",
    "httpx>=0.28.1",
    "pre-commit>=4.5.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.1",
    "pytest>=9.0.1",
    "ruff>=0.14.6",
    "testcontainers>=4.14.2",
    "ty>=0.0.27",
]

[tool.pytest.ini_options]
  addopts = [
    "--cov-branch",
    "--cov-report=html",
    "--cov-report=term-missing",
    "--cov=.",
    "--strict-markers",
    "--tb=short",
    "-v",
  ]
  asyncio_mode = "auto"
  markers = [
    "asyncio: mark a test as requiring asyncio.",
    "integration: mark a test as an integration test.",
    "slow: mark a test as slow.",
    "unit: mark a test as a unit test.",
  ]
