commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: false
  commands:
    format:
      run: just format
      stage_fixed: true
    check-contracts:
      run: just check-contracts
    check-frontend:
      run: just check-frontend
    check-backend:
      run: just check-backend
    check-root:
      run: just check-root
