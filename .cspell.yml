---
version: "0.2"
language: en
dictionaries:
  - cpp-compound-words
  - docker
  - filetypes
  - npm
  - python
  - software-tools
  - softwareTerms

# Include hidden files
enableGlobDot: true

# Files we actually spell-check in this repo.
files:
  - "README.md"
  - "justfile"
  - "backend/app/**/*.py"
  - "backend/scripts/**/*.py"
  - "backend/tests/**/*.py"
  - "backend/justfile"
  - "frontend/src/**/*.{ts,vue}"
  - "frontend/tests/**/*.ts"
  - "frontend/scripts/**/*.mjs"
  - "frontend/justfile"
  - "contracts/**/*.{json,yaml,yml,md}"

# Exclude files in .gitignore
useGitignore: true
ignorePaths:
  - ".git"
  - "*-lock.*"
  - ".vscode/**"
  - "frontend/src/generated/**"
  - "contracts/jsonschema/**"

words:
  # Names
  - Lierde

  # Software terms
  - justfile
  - pipefail
  - sessionmaker
  - vueuse
  - drawpad
  - Drawpad
  - autouse
  - serialisation
  - serialised
  - ROOMWS
  - uppercases
  - initialises
  - authorise

  # Language names
  - Español
  - Français

  # Names
  - Culley
  - Lange

import:
  - "@cspell/dict-es-es/cspell-ext.json"
  - "@cspell/dict-fr-fr/cspell-ext.json"
