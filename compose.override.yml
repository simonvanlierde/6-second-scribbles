# compose.override.yml - Docker Compose overrides for development environment; automatically used on `docker-compose up`
services:

  backend:
    build:
      target: dev
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot reload — /opt/.venv stays in the container
      - ./backend:/app
    env_file:
      - backend/.env.dev
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend_migrations:
    build:
      target: migrations
    env_file:
      - backend/.env.dev

  cache:
    ports:
      - "6379:6379"

  database:
    ports:
      - "5432:5432"
    env_file:
      - backend/.env.dev
