# compose.override.yml - Docker Compose overrides for development environment; automatically used on `docker-compose up`
services:

  backend:
    build:
      target: dev
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot reload — /opt/.venv stays in the container
      - ./backend:/app
    env_file:
      - backend/.env.dev
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend-migrations:
    build:
      target: db-ops
    env_file:
      - backend/.env.dev

  backend-seed:
    build:
      context: ./backend
      target: db-ops
    depends_on:
      database:
        condition: service_healthy
      backend-migrations:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: database
    env_file:
      - backend/.env.dev
    command: ["python", "scripts/seed_data.py"]
    profiles:
      - dev-tools

  cache:
    ports:
      - "6379:6379"

  database:
    ports:
      - "5432:5432"
    env_file:
      - backend/.env.dev
