# compose.override.yml - Docker Compose overrides for development environment; automatically used on `docker-compose up`

name: 6ss-dev

services:

  backend:
    build:
      target: dev
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot reload — /opt/.venv stays in the container
      - ./backend:/app
    env_file:
      - backend/.env.dev
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cache:
    ports:
      - "6379:6379"

  database:
    ports:
      - "5432:5432"
    env_file:
      - backend/.env.dev

  database-migrations:
    build:
      target: db-migrations
    env_file:
      - backend/.env.dev

  # Seed the database - only explicitly added in the dev compose file to develop the seeding mechanism
  database-seed:
    build:
      context: ./backend
      target: db-seed
    depends_on:
      database:
        condition: service_healthy
      database-migrations:
        condition: service_completed_successfully
    volumes:
      # Keep seed/translation file edits on host and reuse downloaded Argos models.
      - ./backend:/app
      - ${ARGOS_MODELS_DIR:-./backend/.argos-models}:/home/appuser/.local/share/argos-translate
    environment:
      POSTGRES_HOST: database
    env_file:
      - backend/.env.dev
    profiles:
      - database-seed

  frontend:
    build:
      target: dev
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app/frontend
    environment:
      VITE_BACKEND_HOST: ws://localhost:8000
