name: "Frontend check"
description: "Install and run frontend lint/type-check/tests using pnpm in the frontend folder."
runs:
  using: "composite"
  steps:
    - name: Setup Node + pnpm
      uses: ./.github/actions/setup-node-pnpm
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install frontend deps
      run: pnpm --dir frontend install --frozen-lockfile

    - name: Run frontend lint
      run: pnpm --dir frontend run lint

    - name: Run frontend type-check
      run: pnpm --dir frontend run type-check

    - name: Run frontend unit tests (optional)
      if: ${{ inputs.run-tests == 'true' }}
      run: pnpm --dir frontend run test:unit

inputs:
  node-version:
    required: false
    default: '24'
  run-tests:
    required: false
    default: 'false'
