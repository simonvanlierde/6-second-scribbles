name: "Frontend check"
description: "Install and run frontend lint/type-check/tests using pnpm in the frontend folder."
runs:
  using: "composite"
  steps:
    - name: Setup Node + pnpm
      uses: ./.github/actions/setup-node-pnpm
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install frontend deps
      shell: bash
      run: pnpm --dir frontend install --frozen-lockfile

    - name: Run frontend lint
      shell: bash
      run: pnpm --dir frontend run lint

    - name: Run frontend type-check
      shell: bash
      run: pnpm --dir frontend run type-check

    - name: Run frontend unit tests (optional)
      if: ${{ inputs.run-tests == 'true' }}
      shell: bash
      # Generate coverage for Codecov without gating CI on vitest's local
      # thresholds (Codecov owns coverage tracking); mirrors the backend's
      # --cov-fail-under=0.
      run: >-
        pnpm --dir frontend exec vitest run --coverage
        --coverage.thresholds.lines=0
        --coverage.thresholds.functions=0
        --coverage.thresholds.branches=0
        --coverage.thresholds.statements=0

inputs:
  node-version:
    required: false
    default: '24'
  run-tests:
    required: false
    default: 'false'
