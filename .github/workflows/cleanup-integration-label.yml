name: Cleanup integration label and comment PR

on:
  workflow_run:
    workflows: [ "Integration & Full Tests" ]
    types: [ completed ]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  cleanup:
    name: Remove label and comment on PRs
    runs-on: ubuntu-latest
    steps:
      - name: Remove label and post status comment
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const conclusion = run.conclusion || 'completed';
            const prs = run.pull_requests || [];
            if (!prs.length) {
              core.info('No PRs associated with this workflow run. Nothing to do.');
              return;
            }
            for (const pr of prs) {
              const pr_number = pr.number;

              // If the integration run succeeded, remove the label; otherwise leave it so authors can re-run
              if (conclusion === 'success') {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr_number,
                    name: 'run/integration',
                  });
                  core.info(`Removed run/integration from PR #${pr_number}`);
                } catch (err) {
                  core.info(`Could not remove label for PR #${pr_number}: ${err.message}`);
                }
              } else {
                core.info(`Integration run for PR #${pr_number} concluded with ${conclusion}; leaving run/integration label in place.`);
              }

              // Post a short comment with the workflow run status
              let body;
              if (conclusion === 'success') {
                body = `Integration workflow run [${run.html_url}](${run.html_url}) completed.\n\nIntegration tests passed ✅\n\nThe \`run/integration\` label has been removed.`;
              } else {
                body = `Integration workflow run [${run.html_url}](${run.html_url}) completed.\n\nIntegration tests finished with status: ${conclusion}.\n\nThe \`run/integration\` label has been left on the PR so you can re-run after fixing issues.`;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr_number,
                body,
              });
            }
