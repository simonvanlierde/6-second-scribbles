name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      contracts: ${{ steps.filter.outputs.contracts }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            contracts:
              - 'contracts/**'
              - 'backend/app/rooms/protocol.py'
              - 'backend/app/*/schemas.py'
              - 'backend/scripts/generate_contracts.py'
              - 'frontend/scripts/generate-contracts.mjs'
              - 'scripts/check-contracts.mjs'
              - 'package.json'
              - 'frontend/package.json'
              - 'pnpm-lock.yaml'
              - 'justfile'
              - 'backend/justfile'
              - 'frontend/justfile'
            root:
              - '.github/**'
              - 'justfile'
              - 'scripts/**'

  root-checks:
    name: Root checks (gitleaks, cspell, biome)
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache cspell results
        uses: actions/cache@v6
        with:
          path: .cspellcache
          key: ${{ runner.os }}-cspell-${{ hashFiles('.cspell.yml', 'package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-cspell-

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run root checks
        run: pnpm run check

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install frontend deps
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Run frontend lint
        run: pnpm --dir frontend run lint

      - name: Run frontend type-check
        run: pnpm --dir frontend run type-check

      # Generate coverage for Codecov without gating CI on vitest's local
      # thresholds (Codecov owns coverage tracking); mirrors the backend's
      # --cov-fail-under=0.
      - name: Run frontend unit tests
        run: >-
          pnpm --dir frontend exec vitest run --coverage
          --coverage.thresholds.lines=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.branches=0
          --coverage.thresholds.statements=0

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend

  a11y:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install frontend deps
        run: pnpm --dir frontend install --frozen-lockfile

      # Frontend-only axe checks (Home, Settings, component library) — no
      # backend, so only the Chromium browser is needed.
      - name: Install Playwright Chromium
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Run accessibility checks
        run: pnpm --dir frontend run test:e2e:a11y

  backend:
    name: Backend checks + unit tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Backend checks + unit tests (composite)
        uses: ./.github/actions/backend-check
        with:
          run-tests-mode: 'unit'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend-unit

  contracts:
    name: Contract generation checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.contracts == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Install root/frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install backend deps
        working-directory: backend
        run: uv sync --all-groups

      - name: Check generated contracts
        run: pnpm run contracts:check

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.root == 'true'
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Backend full tests (composite)
        uses: ./.github/actions/backend-check
        with:
          run-tests-mode: 'all'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend-integration
