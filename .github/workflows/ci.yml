name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            root:
              - '.github/**'
              - 'package.json'
              - 'pyproject.toml'
              - 'justfile'
              - 'README.md'
              - 'scripts/**'

  root-checks:
    name: Root checks (gitleaks, cspell, biome)
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-banner --redact --exit-code 1

      - name: Run cspell
        run: pnpm run cspell

      - name: Root formatting check (biome)
        run: npx -y biome check "**/*.{md,json,yml,yaml,toml}"

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Frontend checks (composite)
        uses: ./.github/actions/frontend-check
        with:
          run-tests: 'false'

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Backend checks (composite)
        uses: ./.github/actions/backend-check
        with:
          run-tests-mode: 'none'

  backend-unit-tests:
    name: Backend unit tests (fast)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Backend unit tests (composite)
        uses: ./.github/actions/backend-check
        with:
          run-tests-mode: 'unit'
