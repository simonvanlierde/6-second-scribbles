name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            contracts:
              - 'contracts/**'
              - 'backend/app/rooms/protocol.py'
              - 'backend/app/*/schemas.py'
              - 'backend/scripts/generate_protocol_contracts.py'
              - 'backend/scripts/export_openapi.py'
              - 'frontend/scripts/generate-types.mjs'
              - 'frontend/scripts/generate-api-types.mjs'
              - 'scripts/check-contracts.mjs'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'justfile'

  root-checks:
    name: Root checks (gitleaks, cspell, biome)
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-banner --redact --exit-code 1

      - name: Run cspell
        run: pnpm run cspell

      - name: Root formatting check (biome)
        run: pnpm exec biome check "**/*.{md,json,yml,yaml,toml}"

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Frontend checks (composite)
        uses: ./.github/actions/frontend-check

  backend:
    name: Backend checks + unit tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Backend checks + unit tests (composite)
        uses: ./.github/actions/backend-check
        with:
          run-tests-mode: 'unit'

  contracts:
    name: Contract generation checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.contracts == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install root/frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install backend deps
        run: uv sync --all-groups

      - name: Check generated contracts
        run: pnpm run contracts:check

      - name: Type-check frontend against generated contracts
        run: pnpm --dir frontend run type-check
