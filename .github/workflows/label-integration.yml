name: Label PR to run integration

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  add-run-integration-label:
    name: Add run/integration label when commanded
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Add label when comment === /run-integration
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment?.body || '';
            if (!body.includes('/run-integration')) {
              core.info('No /run-integration command found; exiting');
              return;
            }
            if (!context.payload.issue || !context.payload.issue.pull_request) {
              core.info('Comment not on a PR - ignoring');
              return;
            }
            const issue_number = context.issue.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['run/integration'],
            });
