name: Integration & Full Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            root:
              - '.github/**'
              - 'pyproject.toml'
              - 'justfile'
              - 'scripts/**'

  backend-tests:
    name: Backend integration tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.root == 'true'
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Backend full tests (composite)
        uses: ./.github/actions/backend-check
        with:
          run-tests-mode: 'all'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend-integration
