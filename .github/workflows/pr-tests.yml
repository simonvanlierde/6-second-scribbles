name: Integration & Full Tests

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened, labeled ]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: integration-tests
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            backend:
              - 'backend/**'
            root:
              - '.github/**'
              - 'pyproject.toml'
              - 'justfile'
              - 'scripts/**'

  backend-tests:
    name: Backend full tests (cached + guarded)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name != 'pull_request' || contains(join(github.event.pull_request.labels.*.name, ','), 'run/integration') || needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.root == 'true'
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv & Python
        uses: ./.github/actions/setup-uv

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install backend dependencies
        run: uv sync --all-groups

      - name: Run backend tests (pytest)
        run: uv run pytest -x --tb=short
